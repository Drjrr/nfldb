<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL DFS Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --accent-color: #f59e0b;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --dark-bg: #1f2937;
            --light-bg: #f8fafc;
        }

        body {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #374151 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background: rgba(30, 58, 138, 0.95) !important;
            backdrop-filter: blur(10px);
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }

        .btn-success {
            background: linear-gradient(45deg, var(--success-color), #34d399);
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: 600;
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border-radius: 10px;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--secondary-color);
            color: #ffffff;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }

        .table {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .table th {
            background: rgba(30, 58, 138, 0.8);
            border: none;
            font-weight: 600;
        }

        .table td {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .loading {
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner-border {
            width: 2rem;
            height: 2rem;
        }

        .alert {
            border-radius: 10px;
            border: none;
        }

        .lineup-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .player-row {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px;
            margin: 5px 0;
            border-left: 4px solid var(--secondary-color);
        }

        .stats-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(16, 185, 129, 0.2));
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .stats-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .position-badge {
            background: var(--secondary-color);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .team-badge {
            background: var(--accent-color);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-chart-line me-2"></i>
                NFL DFS Optimizer
            </a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text">
                    <i class="fas fa-clock me-1"></i>
                    <span id="current-time"></span>
                </span>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Header -->
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="text-center mb-3">
                    <i class="fas fa-trophy me-2"></i>
                    Daily Fantasy Sports Optimizer
                </h1>
                <p class="text-center text-muted">Optimize your NFL DFS lineups with advanced algorithms</p>
            </div>
        </div>

        <!-- Data Collection Section -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-download me-2"></i>Data Collection</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <label for="week" class="form-label">Week</label>
                                <select class="form-select" id="week">
                                    <option value="1">Week 1</option>
                                    <option value="2">Week 2</option>
                                    <option value="3">Week 3</option>
                                    <option value="4">Week 4</option>
                                    <option value="5">Week 5</option>
                                    <option value="6">Week 6</option>
                                    <option value="7">Week 7</option>
                                    <option value="8">Week 8</option>
                                    <option value="9">Week 9</option>
                                    <option value="10">Week 10</option>
                                    <option value="11">Week 11</option>
                                    <option value="12">Week 12</option>
                                    <option value="13">Week 13</option>
                                    <option value="14">Week 14</option>
                                    <option value="15">Week 15</option>
                                    <option value="16">Week 16</option>
                                    <option value="17">Week 17</option>
                                    <option value="18">Week 18</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="season" class="form-label">Season</label>
                                <select class="form-select" id="season">
                                    <option value="2024">2024</option>
                                    <option value="2023">2023</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="contest-type" class="form-label">Contest Type ID</label>
                                <input type="number" class="form-control" id="contest-type" value="21">
                            </div>
                            <div class="col-md-3">
                                <label for="draft-group" class="form-label">Draft Group ID</label>
                                <input type="number" class="form-control" id="draft-group" value="131064">
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-12">
                                <button class="btn btn-primary" onclick="collectData()">
                                    <i class="fas fa-download me-2"></i>
                                    Collect Data
                                </button>
                                <div class="loading mt-2" id="data-loading">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    <span class="ms-2">Collecting data...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Statistics Section -->
        <div class="row mb-4" id="stats-section" style="display: none;">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-chart-bar me-2"></i>Data Statistics</h5>
                    </div>
                    <div class="card-body">
                        <div class="row" id="stats-content">
                            <!-- Stats will be populated here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Optimization Section -->
        <div class="row mb-4" id="optimization-section" style="display: none;">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-cogs me-2"></i>Lineup Optimization</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <label for="num-lineups" class="form-label">Number of Lineups</label>
                                <input type="number" class="form-control" id="num-lineups" value="1" min="1" max="150">
                            </div>
                            <div class="col-md-3">
                                <label for="max-exposure" class="form-label">Max Exposure</label>
                                <input type="number" class="form-control" id="max-exposure" value="1.0" min="0.1" max="1.0" step="0.1">
                            </div>
                            <div class="col-md-3">
                                <label for="optimization-type" class="form-label">Optimization Type</label>
                                <select class="form-select" id="optimization-type">
                                    <option value="standard">Standard</option>
                                    <option value="leverage">Leverage</option>
                                    <option value="correlation">Correlation</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="leverage-weight" class="form-label">Leverage Weight</label>
                                <input type="number" class="form-control" id="leverage-weight" value="0.3" min="0.1" max="1.0" step="0.1">
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-12">
                                <button class="btn btn-success" onclick="optimizeLineups()">
                                    <i class="fas fa-magic me-2"></i>
                                    Optimize Lineups
                                </button>
                                <div class="loading mt-2" id="optimization-loading">
                                    <div class="spinner-border text-success" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    <span class="ms-2">Optimizing lineups...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div class="row" id="results-section" style="display: none;">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-list me-2"></i>Optimized Lineups</h5>
                    </div>
                    <div class="card-body">
                        <div id="lineups-container">
                            <!-- Lineups will be populated here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Alerts -->
        <div id="alerts-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1050;">
            <!-- Alerts will be shown here -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Global variables
        let currentData = null;
        let currentLineups = [];

        // Update current time
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleString();
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Show alert
        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alerts-container');
            const alertId = 'alert-' + Date.now();
            
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" id="${alertId}" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            alertContainer.insertAdjacentHTML('beforeend', alertHtml);
            
            // Auto-dismiss after 5 seconds
            setTimeout(() => {
                const alert = document.getElementById(alertId);
                if (alert) {
                    alert.remove();
                }
            }, 5000);
        }

        // Collect data from DraftKings
        async function collectData() {
            const loading = document.getElementById('data-loading');
            loading.classList.add('show');
            
            try {
                const week = document.getElementById('week').value;
                const season = document.getElementById('season').value;
                const contestTypeId = document.getElementById('contest-type').value;
                const draftGroupId = document.getElementById('draft-group').value;
                
                const response = await fetch('/api/collect-data', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        week: parseInt(week),
                        season: parseInt(season),
                        contest_type_id: parseInt(contestTypeId),
                        draft_group_id: parseInt(draftGroupId)
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert(result.message, 'success');
                    currentData = result;
                    
                    // Show optimization section
                    document.getElementById('optimization-section').style.display = 'block';
                    
                    // Load statistics
                    loadStats();
                } else {
                    showAlert('Error: ' + result.error, 'danger');
                }
            } catch (error) {
                showAlert('Error collecting data: ' + error.message, 'danger');
            } finally {
                loading.classList.remove('show');
            }
        }

        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const result = await response.json();
                
                if (result.success) {
                    displayStats(result.stats);
                    document.getElementById('stats-section').style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Display statistics
        function displayStats(stats) {
            const statsContent = document.getElementById('stats-content');
            
            statsContent.innerHTML = `
                <div class="col-md-3">
                    <div class="stats-card">
                        <div class="stats-number">${stats.total_players}</div>
                        <div class="text-muted">Total Players</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stats-card">
                        <div class="stats-number">$${stats.salary_range.avg.toLocaleString()}</div>
                        <div class="text-muted">Avg Salary</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stats-card">
                        <div class="stats-number">${stats.projected_points_range.avg.toFixed(1)}</div>
                        <div class="text-muted">Avg Projected Points</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stats-card">
                        <div class="stats-number">${Object.keys(stats.teams).length}</div>
                        <div class="text-muted">Teams</div>
                    </div>
                </div>
            `;
        }

        // Optimize lineups
        async function optimizeLineups() {
            const loading = document.getElementById('optimization-loading');
            loading.classList.add('show');
            
            try {
                const numLineups = document.getElementById('num-lineups').value;
                const maxExposure = document.getElementById('max-exposure').value;
                const optimizationType = document.getElementById('optimization-type').value;
                const leverageWeight = document.getElementById('leverage-weight').value;
                
                const response = await fetch('/api/optimize', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        num_lineups: parseInt(numLineups),
                        max_exposure: parseFloat(maxExposure),
                        optimization_type: optimizationType,
                        leverage_weight: parseFloat(leverageWeight)
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert(`Successfully optimized ${result.total_lineups} lineups!`, 'success');
                    currentLineups = result.lineups;
                    displayLineups(result.lineups);
                    document.getElementById('results-section').style.display = 'block';
                } else {
                    showAlert('Error: ' + result.error, 'danger');
                }
            } catch (error) {
                showAlert('Error optimizing lineups: ' + error.message, 'danger');
            } finally {
                loading.classList.remove('show');
            }
        }

        // Display lineups
        function displayLineups(lineups) {
            const container = document.getElementById('lineups-container');
            
            container.innerHTML = lineups.map((lineup, index) => `
                <div class="lineup-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6>Lineup ${lineup.lineup_id}</h6>
                        <div>
                            <span class="badge bg-success me-2">$${lineup.total_salary.toLocaleString()}</span>
                            <span class="badge bg-primary">${lineup.total_projected_points.toFixed(1)} pts</span>
                        </div>
                    </div>
                    
                    <div class="row">
                        ${lineup.players.map(player => `
                            <div class="col-md-6 col-lg-4 mb-2">
                                <div class="player-row">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div>
                                            <strong>${player.name}</strong>
                                            <br>
                                            <span class="position-badge">${player.position}</span>
                                            ${player.team ? `<span class="team-badge ms-1">${player.team}</span>` : ''}
                                        </div>
                                        <div class="text-end">
                                            <div>$${player.salary.toLocaleString()}</div>
                                            <div class="text-success">${player.projected_points.toFixed(1)} pts</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    ${lineup.validation_errors && lineup.validation_errors.length > 0 ? `
                        <div class="alert alert-warning mt-3">
                            <strong>Validation Warnings:</strong>
                            <ul class="mb-0 mt-2">
                                ${lineup.validation_errors.map(error => `<li>${error}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
